<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items - Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .item-card {
            transition: all 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="flex bg-gray-100 rounded-lg p-1">
                    <button onclick="switchTab('lost')" id="lostTab" class="px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                        Lost Items
                    </button>
                    <button onclick="switchTab('found')" id="foundTab" class="px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                        Found Items
                    </button>
                </div>

                <div class="flex-1 max-w-md">
                    <div class="relative">
                        <i data-feather="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input type="text" id="searchInput" placeholder="Search items..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>

                <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">All Categories</option>
                </select>

                <select id="sortBy" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="recent">Most Recent</option>
                    <option value="oldest">Oldest First</option>
                    <option value="views">Most Viewed</option>
                </select>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div id="statsBar" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <!-- Will be populated -->
        </div>

        <div id="loadingState" class="flex justify-center items-center py-20">
            <div class="loading-spinner"></div>
        </div>

        <div id="itemsGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items will be loaded here -->
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i data-feather="inbox" class="w-16 h-16 mx-auto text-gray-400 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">No Items Found</h3>
            <p class="text-gray-600">Try adjusting your filters or check back later</p>
        </div>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onclick="closeItemModal()"></div>
        <div class="relative z-10 flex min-h-full items-center justify-center p-4">
            <div class="w-full max-w-2xl rounded-3xl bg-white shadow-2xl">
                <div id="itemModalContent"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const CATEGORIES = ['electronics', 'clothing', 'accessories', 'books', 'keys', 'wallet', 'id-card', 'bag', 'sports', 'other'];
        let currentTab = 'lost';
        let allItems = [];
        let filteredItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            initializeFeed();
        });

        function initializeFeed() {
            if (!isLoggedIn()) {
                window.location.href = 'auth.html';
                return;
            }

            populateCategoryFilter();
            updateTabStyles();

            document.getElementById('searchInput')?.addEventListener('input', debounce(applyFilters, 200));
            document.getElementById('categoryFilter')?.addEventListener('change', applyFilters);
            document.getElementById('sortBy')?.addEventListener('change', applyFilters);

            loadItems();
            feather.replace();
        }

        function authHeader() {
            const token = localStorage.getItem('token');
            return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('userData') || '{}');
        }

        function isLoggedIn() {
            return Boolean(localStorage.getItem('token'));
        }

        async function apiCall(endpoint, options = {}) {
            const headers = { ...(options.headers || {}), ...authHeader() };

            if (!(options.body instanceof FormData) && !headers['Content-Type']) {
                headers['Content-Type'] = 'application/json';
            }

            const response = await fetch(API_URL + endpoint, {
                ...options,
                headers
            });
            const data = await response.json().catch(() => ({}));
            if (response.status === 401) {
                localStorage.removeItem('isAuthenticated');
                localStorage.removeItem('userData');
                localStorage.removeItem('token');
                window.location.href = 'auth.html';
                throw new Error(data.message || 'Please sign in to continue');
            }
            if (!response.ok) throw new Error(data.message || 'API error');
            return data;
        }

        function populateCategoryFilter() {
            const categoryFilter = document.getElementById('categoryFilter');
            if (!categoryFilter || categoryFilter.options.length > 1) return;

            CATEGORIES.forEach((category) => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category
                    .split('-')
                    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                    .join(' ');
                categoryFilter.appendChild(option);
            });
        }

        function updateTabStyles() {
            const lostTab = document.getElementById('lostTab');
            const foundTab = document.getElementById('foundTab');
            if (!lostTab || !foundTab) return;

            const activeClasses = ['bg-white', 'text-slate-900', 'shadow-sm'];
            const inactiveClasses = ['text-slate-500'];

            [lostTab, foundTab].forEach((button) => {
                button.classList.remove(...activeClasses, ...inactiveClasses);
                button.classList.add(...inactiveClasses);
            });

            const activeButton = currentTab === 'lost' ? lostTab : foundTab;
            activeButton.classList.remove(...inactiveClasses);
            activeButton.classList.add(...activeClasses);
        }

        async function loadItems() {
            showLoading();
            try {
                const type = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
                allItems = await apiCall(`/items?type=${type}`);
                applyFilters();
                updateStats();
            } catch (error) {
                console.error('Error loading items:', error);
                showNotification(error.message || 'Could not load items', 'error');
                showEmptyState();
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const category = document.getElementById('categoryFilter')?.value || '';
            const sortBy = document.getElementById('sortBy')?.value || 'recent';

            filteredItems = allItems.filter((item) => {
                const searchStr = [item.title, item.description, item.location].filter(Boolean).join(' ').toLowerCase();
                const matchesSearch = !searchTerm || searchStr.includes(searchTerm);
                const matchesCategory = !category || item.category === category;
                return matchesSearch && matchesCategory;
            });

            filteredItems.sort((a, b) => {
                if (sortBy === 'recent') return new Date(b.createdAt) - new Date(a.createdAt);
                if (sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
                if (sortBy === 'views') return (b.views || 0) - (a.views || 0);
                return 0;
            });

            displayItems();
        }

        function displayItems() {
            const grid = document.getElementById('itemsGrid');
            if (!grid) return;

            if (filteredItems.length === 0) {
                showEmptyState();
                return;
            }

            grid.innerHTML = '';
            grid.classList.remove('hidden');
            document.getElementById('emptyState')?.classList.add('hidden');
            document.getElementById('loadingState')?.classList.add('hidden');

            filteredItems.forEach((item) => grid.appendChild(createItemCard(item)));
            feather.replace();
        }

        function createItemCard(item) {
            const card = document.createElement('div');
            card.className = 'item-card bg-white rounded-xl overflow-hidden shadow-sm cursor-pointer hover:shadow-md transition-shadow';
            card.onclick = () => viewItemDetails(item);

            const imageUrl = item.imageURL || item.image || 'https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=400';
            const type = item.type || 'Lost';
            const statusColor = type === 'Lost' ? 'bg-red-500' : 'bg-green-500';

            card.innerHTML = `
                <div class="relative">
                    <img src="${imageUrl}" alt="${item.title}" class="w-full h-48 object-cover" onerror="this.src='https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=400'">
                    <div class="absolute top-2 left-2">
                        <span class="${statusColor} text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase">
                            ${type}
                        </span>
                    </div>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-800 mb-1 line-clamp-1">${item.title}</h3>
                    <p class="text-gray-500 text-xs mb-3 line-clamp-2 h-8">${item.description}</p>
                    <div class="flex flex-wrap gap-1 mb-3">
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded capitalize">${item.category || 'other'}</span>
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded">Location: ${item.location || 'Unknown'}</span>
                    </div>
                    <div class="flex justify-between items-center text-[10px] text-gray-400 pt-3 border-t">
                        <span>${new Date(item.date || item.createdAt).toLocaleDateString()}</span>
                        <span class="font-semibold text-blue-500">Details -></span>
                    </div>
                </div>
            `;

            return card;
        }

        function viewItemDetails(item) {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'VIEW_ITEM', itemId: item._id }, '*');
                return;
            }

            const currentUser = getCurrentUser();
            const isOwnItem = item.postedBy?._id === currentUser._id;
            const imageUrl = item.imageURL || item.image || 'https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=400';
            const modal = document.getElementById('itemModal');
            const content = document.getElementById('itemModalContent');

            if (!modal || !content) return;

            const reporterName = item.postedBy?.name || `${item.postedBy?.firstName || ''} ${item.postedBy?.lastName || ''}`.trim() || 'Unknown user';

            content.innerHTML = `
                <div class="p-6 md:p-8">
                    <div class="flex items-start justify-between gap-4 mb-6">
                        <div>
                            <p class="text-xs font-bold uppercase tracking-[0.2em] ${item.type === 'Lost' ? 'text-red-500' : 'text-emerald-600'}">${item.type}</p>
                            <h2 class="text-2xl font-bold text-slate-900 mt-2">${item.title}</h2>
                        </div>
                        <button onclick="closeItemModal()" class="rounded-full bg-slate-100 p-2 text-slate-500 hover:bg-slate-200">
                            <i data-feather="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <img src="${imageUrl}" alt="${item.title}" class="w-full h-72 rounded-2xl object-cover mb-6" onerror="this.src='https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=400'">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Category</p>
                            <p class="mt-2 text-slate-900 font-semibold capitalize">${item.category || 'other'}</p>
                        </div>
                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Date</p>
                            <p class="mt-2 text-slate-900 font-semibold">${new Date(item.date || item.createdAt).toLocaleDateString()}</p>
                        </div>
                        <div class="rounded-2xl bg-slate-50 p-4 md:col-span-2">
                            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Description</p>
                            <p class="mt-2 text-slate-700 leading-6">${item.description}</p>
                        </div>
                        <div class="rounded-2xl bg-slate-50 p-4 md:col-span-2">
                            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Location</p>
                            <p class="mt-2 text-slate-700">${item.location || 'Not specified'}</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4 rounded-2xl border border-slate-200 p-4">
                        <div>
                            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Reported By</p>
                            <p class="mt-1 font-semibold text-slate-900">${reporterName}</p>
                            <p class="text-sm text-slate-500">${item.postedBy?.email || 'No public email'}</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3">
                            ${isOwnItem
                                ? `<button class="rounded-xl bg-slate-100 px-4 py-3 font-semibold text-slate-500 cursor-default" disabled>This is your item</button>`
                                : isLoggedIn()
                                    ? `<button onclick="startChatFromFeed('${item.postedBy?._id}', '${item._id}')" class="rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white">Message Reporter</button>`
                                    : `<button onclick="redirectToLogin()" class="rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white">Login to Message</button>`}
                            ${item.postedBy?.email ? `<a href="mailto:${item.postedBy.email}" class="rounded-xl border border-slate-300 px-4 py-3 font-semibold text-slate-700 text-center">Email Reporter</a>` : ''}
                        </div>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
            feather.replace();
        }

        function closeItemModal() {
            document.getElementById('itemModal')?.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        async function startChatFromFeed(userId, itemId) {
            try {
                const chat = await apiCall('/chat/start', {
                    method: 'POST',
                    body: JSON.stringify({ otherUserId: userId, itemId })
                });

                localStorage.setItem('pendingChatId', chat.matchId);
                localStorage.setItem('pendingChatUserId', userId);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showNotification(error.message || 'Could not start chat', 'error');
            }
        }

        function redirectToLogin() {
            window.location.href = 'auth.html';
        }

        function switchTab(tab) {
            currentTab = tab;
            updateTabStyles();
            loadItems();
        }

        function updateStats() {
            const statsBar = document.getElementById('statsBar');
            const currentUser = getCurrentUser();
            const photoCount = allItems.filter((item) => item.imageURL || item.image).length;
            const contactableCount = allItems.filter((item) => item.postedBy?._id !== currentUser._id).length;
            const tabLabel = currentTab === 'lost' ? 'Lost reports' : 'Found reports';

            statsBar.innerHTML = `
                <div class="bg-white rounded-lg p-3 shadow-sm border-l-4 border-red-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-[10px] uppercase font-bold">${tabLabel}</p>
                            <p class="text-xl font-bold text-gray-800">${allItems.length}</p>
                        </div>
                        <i data-feather="alert-circle" class="w-6 h-6 text-red-100"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg p-3 shadow-sm border-l-4 border-green-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-[10px] uppercase font-bold">With Photos</p>
                            <p class="text-xl font-bold text-gray-800">${photoCount}</p>
                        </div>
                        <i data-feather="image" class="w-6 h-6 text-green-100"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg p-3 shadow-sm border-l-4 border-blue-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-[10px] uppercase font-bold">Can Contact</p>
                            <p class="text-xl font-bold text-gray-800">${contactableCount}</p>
                        </div>
                        <i data-feather="message-square" class="w-6 h-6 text-blue-100"></i>
                    </div>
                </div>
            `;

            feather.replace();
        }

        function showLoading() {
            document.getElementById('loadingState')?.classList.remove('hidden');
            document.getElementById('itemsGrid')?.classList.add('hidden');
            document.getElementById('emptyState')?.classList.add('hidden');
        }

        function showEmptyState() {
            document.getElementById('emptyState')?.classList.remove('hidden');
            document.getElementById('itemsGrid')?.classList.add('hidden');
            document.getElementById('loadingState')?.classList.add('hidden');
        }

        function showNotification(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
</html>
