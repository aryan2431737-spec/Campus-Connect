services:
  - type: web
    name: campus-connect
    runtime: node
    plan: free
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SQLITE_PATH
        value: ./data/lostandfound.sqlite
      - key: UPLOADS_DIR
        value: ./uploads
